<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">

  <title>ServerShop | Products</title>
</head>
<body>
  <div class="base">
    <div class="header">
      <a href="/"><h1>ServerShop</h1></a>

      {% if session.get('user') %}
        <div class="user-area">
          <span>Hi, {{ session['user'] }}</span>
          <form method="post" action="{{ url_for('logout') }}">
            <input type="submit" value="Logout">
          </form>
        </div>
      {% else %}
        <form method="post" action="{{ url_for('login') }}">
          <label for="user">Username:</label>
          <input type="text" id="user" name="user">

          <label for="password">Password:</label>
          <input type="password" id="password" name="password">

          <input type="submit" value="Login">
        </form>
      {% endif %}
    </div>

    <div class="content" id="content">
        <div id="listing"></div>

        <div class="add-cart">
        <label>
            Qty:
            <input id="qty" type="number" min="1" max="99" value="1">
        </label>
        <button id="addToCart" type="button">Add to cart</button>
        <span id="cartStatus"></span>
        </div>
    </div>

    <div class="right"></div>
  </div>

  <script src="{{ url_for('static', filename='js/listing.js') }}"></script>
</body>
</html>
