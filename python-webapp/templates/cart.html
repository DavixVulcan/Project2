<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
  <title>ServerShop | Cart</title>
</head>
<body>
  <div class="base">
    <div class="header">
      <h1>ServerShop</h1>
    </div>

    <div class="content">
      <h2>Your Cart</h2>

      <div id="cartGrid" class="grid"></div>

      <div style="margin-top:16px;">
        <strong>Total:</strong> <span id="total">$0.00</span>
      </div>

      <div style="margin-top:12px;">
        <button id="placeOrder" type="button">Place order</button>
        <span id="status"></span>
      </div>
    </div>

    <div class="right"></div>
  </div>

  <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
</body>
</html>
