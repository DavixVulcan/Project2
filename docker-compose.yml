services:
  microservice-userauth:
    build:
      context: .
      dockerfile: microservice-userauth/Dockerfile
    # If you want host access for testing, keep ports.
    # If you want it internal-only, REMOVE the ports section.
    ports:
      - "50051:50051"
    volumes:
      - ./auth_data:/data
    environment:
      - DB_PATH=/data/users.db
      - SEED_USER=admin
      - SEED_PASS=admin123

  microservice-productlisting:
    build:
      context: .
      dockerfile: microservice-productlisting/Dockerfile
    # internal only
    expose:
      - "50052"
    volumes:
      - ./productlisting_data:/data
    environment:
      - DB_PATH=/data/products.db
    
  microservice-usercarts:
    build:
      context: .
      dockerfile: microservice-usercarts/Dockerfile
    expose:
      - "50053"
    volumes:
      - ./carts_data:/data
    environment:
      - DB_PATH=/data/carts.db

  python-webapp:
    build:
      context: .
      dockerfile: python-webapp/Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - microservice-userauth
      - microservice-productlisting
      - microservice-usercarts
    environment:
      - AUTH_TARGET=microservice-userauth:50051
      - PRODUCTS_GRPC_TARGET=microservice-productlisting:50052
      - CARTS_GRPC_TARGET=microservice-usercarts:50053